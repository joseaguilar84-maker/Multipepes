name: Compilar APK Multipepes

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias de Linux
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev cmake python3-setuptools

    - name: Instalar Cython y Buildozer
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0"
        pip install git+https://github.com
        pip install git+https://github.com

    - name: Construir APK de Multipepes
      run: |
        export P4A_RELEASE_DOWNLOAD_ALLOW_INSECURE=1
        buildozer android debug

    - name: Subir el archivo APK resultante
      uses: actions/upload-artifact@v4
      with:
        name: Multipepes-APK-Instalable
        path: bin/*.apk
